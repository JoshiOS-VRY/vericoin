# Vericoind config for the binarytest (DACE) test network.
# Loaded by docker-compose into /home/dace/.vericonomy/binarytest-vericoin/vericoin.conf.

# Static RPC credentials for the test network. NEVER use these on mainnet.
rpcuser=rpcuser
rpcpassword=rpcpass
rpcport=41683
rpcbind=0.0.0.0
rpcallowip=172.28.0.0/16

# P2P binding
port=41684
bind=0.0.0.0
listen=1

# Logging
debug=1
debuglogfile=/home/dace/.vericonomy/binarytest-vericoin/debug.log
printtoconsole=1

# DACE shadow mode is OFF on binarytest by default — we want hard enforcement
# to exercise the full pipeline. Toggle to 1 to demo soft mode.
# dace-shadow-mode=0

# Staking enabled out of the gate to populate accumulators.
staking=1
